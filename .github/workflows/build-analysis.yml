name: Build Performance Analysis

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode'
        required: true
        default: 'pr-check'
        type: choice
        options:
          - pr-check
          - beta
          - release
  schedule:
    - cron: '0 6 * * 1'  # 每周一分析
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'  # 只在工作流变更时触发

jobs:
  cold-build:
    runs-on: windows-latest
    outputs:
      build-time: ${{ steps.build.outputs.time }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust (No Cache)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install sccache (Cold Build)
        shell: pwsh
        run: |
          $destPath = "C:\sccache_bin"
          if (!(Test-Path "$destPath\sccache.exe")) {
            $url = "https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz"
            Invoke-WebRequest -Uri $url -OutFile sccache.tar.gz
            tar -xzf sccache.tar.gz
            $sccacheExe = Get-ChildItem -Path . -Filter sccache.exe -Recurse | Select-Object -First 1
            if (!(Test-Path $destPath)) { New-Item -ItemType Directory -Path $destPath }
            Move-Item $sccacheExe.FullName "$destPath\sccache.exe"
            Remove-Item sccache.tar.gz -Force
          }
          echo "$destPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cold Build Benchmark
        id: build
        run: |
          # 清理所有缓存
          if (Test-Path "C:\sccache") { Remove-Item "C:\sccache" -Recurse -Force }
          if (Test-Path "src-tauri\target") { Remove-Item "src-tauri\target" -Recurse -Force }
          
          $testMode = "${{ github.event.inputs.test_mode || 'pr-check' }}"
          Write-Host "🧪 Test mode: $testMode"
          
          # 根据测试模式设置签名环境变量
          if ($testMode -eq "release") {
            $env:TAURI_SIGNING_PRIVATE_KEY = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
            Write-Host "🔐 Release mode: Code signing enabled"
          } else {
            $env:TAURI_SIGNING_PRIVATE_KEY = ""
            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = ""
            Write-Host "🔓 Non-release mode: Code signing disabled"
          }
          
          # 清零 sccache 统计
          sccache --zero-stats
          
          $start = Get-Date
          
          # 根据测试模式选择构建命令
          if ($testMode -eq "release") {
            # Release 模式：完整签名构建
            pnpm tauri build --verbose
          } elseif ($testMode -eq "beta") {
            # Beta 模式：模拟签名但可能失败
            try {
              pnpm tauri build --verbose
            } catch {
              Write-Host "Beta 模式：签名失败，继续构建"
              pnpm tauri build --verbose --no-bundle
            }
          } else {
            # PR Check 模式：无签名快速构建
            pnpm tauri build --verbose --no-bundle
          }
          
          $end = Get-Date
          $duration = ($end - $start).TotalSeconds
          echo "time=$duration" >> $env:GITHUB_OUTPUT
          echo "🧊 Cold build time ($testMode): $duration seconds"
          
          # 显示 sccache 统计
          Write-Host "📊 sccache statistics (cold build):"
          sccache --show-stats

  warm-build:
    needs: cold-build
    runs-on: windows-latest
    outputs:
      build-time: ${{ steps.build.outputs.time }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust with Cache
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          
      - name: Install sccache (Warm Build)
        shell: pwsh
        run: |
          $destPath = "C:\sccache_bin"
          if (!(Test-Path "$destPath\sccache.exe")) {
            $url = "https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz"
            Invoke-WebRequest -Uri $url -OutFile sccache.tar.gz
            tar -xzf sccache.tar.gz
            $sccacheExe = Get-ChildItem -Path . -Filter sccache.exe -Recurse | Select-Object -First 1
            if (!(Test-Path $destPath)) { New-Item -ItemType Directory -Path $destPath }
            Move-Item $sccacheExe.FullName "$destPath\sccache.exe"
            Remove-Item sccache.tar.gz -Force
          }
          echo "$destPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
      - name: Cache sccache and Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          cache-all-crates: true
          cache-on-failure: true

      - name: Warm Build Benchmark
        id: build
        run: |
          $testMode = "${{ github.event.inputs.test_mode || 'pr-check' }}"
          Write-Host "🧪 Test mode: $testMode"
          
          # 根据测试模式设置签名环境变量
          if ($testMode -eq "release") {
            $env:TAURI_SIGNING_PRIVATE_KEY = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
            Write-Host "🔐 Release mode: Code signing enabled"
          } else {
            $env:TAURI_SIGNING_PRIVATE_KEY = ""
            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = ""
            Write-Host "🔓 Non-release mode: Code signing disabled"
          }
          
          # 清零 sccache 统计
          sccache --zero-stats
          
          $start = Get-Date
          
          # 根据测试模式选择构建命令
          if ($testMode -eq "release") {
            # Release 模式：完整签名构建
            pnpm tauri build --verbose
          } elseif ($testMode -eq "beta") {
            # Beta 模式：模拟签名但可能失败
            try {
              pnpm tauri build --verbose
            } catch {
              Write-Host "Beta 模式：签名失败，继续构建"
              pnpm tauri build --verbose --no-bundle
            }
          } else {
            # PR Check 模式：无签名快速构建
            pnpm tauri build --verbose --no-bundle
          }
          
          $end = Get-Date
          $duration = ($end - $start).TotalSeconds
          echo "time=$duration" >> $env:GITHUB_OUTPUT
          echo "🔥 Warm build time ($testMode): $duration seconds"
          
          # 显示 sccache 统计
          Write-Host "📊 sccache statistics (warm build):"
          sccache --show-stats
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: C:\sccache
          SCCACHE_CACHE_SIZE: 2G
          SCCACHE_IDLE_TIMEOUT: 0

  analysis:
    needs: [cold-build, warm-build]
    runs-on: windows-latest
    
    steps:
      - name: Performance Analysis
        id: analysis
        run: |
          $coldTime = "${{ needs.cold-build.outputs.build-time }}"
          $warmTime = "${{ needs.warm-build.outputs.build-time }}"
          $improvement = [math]::Round((($coldTime - $warmTime) / $coldTime) * 100, 2)
          $testMode = "${{ github.event.inputs.test_mode || 'pr-check' }}"
          
          echo "📊 Performance Report ($testMode):"
          echo "  Cold Build: $coldTime seconds"
          echo "  Warm Build: $warmTime seconds"
          echo "  Improvement: $improvement%"
          
          # 不同模式的预期改进阈值
          if ($testMode -eq "release") {
            echo "  🎯 Release 模式预期改进: 20-40% (签名时间不可缓存)"
          } elseif ($testMode -eq "beta") {
            echo "  🎯 Beta 模式预期改进: 25-45% (部分签名)"
          } else {
            echo "  🎯 PR Check 模式预期改进: 50-70% (无签名)"
          }
          
          echo "improvement=$improvement" >> $env:GITHUB_OUTPUT
          echo "test-mode=$testMode" >> $env:GITHUB_OUTPUT

      - name: Create Performance Report
        run: |
          $testMode = "${{ github.event.inputs.test_mode || 'pr-check' }}"
          
          echo "# 🏗️ Build Performance Report ($testMode)" > performance-report.md
          echo "" >> performance-report.md
          echo "| Metric | Value |" >> performance-report.md
          echo "|--------|-------|" >> performance-report.md
          echo "| Test Mode | $testMode |" >> performance-report.md
          echo "| Cold Build | ${{ needs.cold-build.outputs.build-time }}s |" >> performance-report.md
          echo "| Warm Build | ${{ needs.warm-build.outputs.build-time }}s |" >> performance-report.md
          echo "| Cache Improvement | ${{ steps.analysis.outputs.improvement }} |" >> performance-report.md
          echo "" >> performance-report.md
          echo "## 📊 Analysis" >> performance-report.md
          echo "" >> performance-report.md
          if ($testMode -eq "release") {
            echo "- Release 模式：包含完整签名流程" >> performance-report.md
            echo "- 预期改进：20-40%（签名时间不可缓存）" >> performance-report.md
          } elseif ($testMode -eq "beta") {
            echo "- Beta 模式：部分签名测试" >> performance-report.md
            echo "- 预期改进：25-45%" >> performance-report.md
          } else {
            echo "- PR Check 模式：无签名快速构建" >> performance-report.md
            echo "- 预期改进：50-70%" >> performance-report.md
          }
          echo "" >> performance-report.md
          echo "*Generated on: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')*" >> performance-report.md

      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-${{ github.run_number }}
          path: performance-report.md
          retention-days: 30
