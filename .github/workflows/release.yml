name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry Run'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Rust toolchain and dependencies
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.cargo\bin
            C:\Users\runneradmin\.cargo\env
            C:\Users\runneradmin\.cargo\registry\index
            C:\Users\runneradmin\.cargo\registry\cache
            C:\Users\runneradmin\.cargo\git\db
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-
            ${{ runner.os }}-rust-toolchain-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install sccache
        shell: pwsh
        run: |
          $destPath = "C:\sccache_bin"
          if (!(Test-Path "$destPath\sccache.exe")) {
            $url = "https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz"
            Invoke-WebRequest -Uri $url -OutFile sccache.tar.gz
            tar -xzf sccache.tar.gz
            $sccacheExe = Get-ChildItem -Path . -Filter sccache.exe -Recurse | Select-Object -First 1
            if (!(Test-Path $destPath)) { New-Item -ItemType Directory -Path $destPath }
            Move-Item $sccacheExe.FullName "$destPath\sccache.exe"
            Remove-Item sccache.tar.gz -Force
          }
          echo "$destPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: C:\sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: 'Dry Run - Stage 1/2: Build and Package Tauri App'
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: C:\sccache
          SCCACHE_CACHE_SIZE: 2G
          SCCACHE_IDLE_TIMEOUT: 0

      - name: Build & Upload Setup
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: C:\sccache
          SCCACHE_CACHE_SIZE: 2G
          SCCACHE_IDLE_TIMEOUT: 0
        with:
          includeRelease: true
          tagName: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}

      - name: Stop sccache server
        run: sccache --stop-server || true
        shell: pwsh

      - name: 'Dry Run - Stage 2/2: Verify Build Artifacts'
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        shell: pwsh
        run: |
          Write-Host "🔎 Verifying dry run outputs..."

          $exePath = "src-tauri/target/release/Pailer.exe"
          if (Test-Path $exePath) {
            Write-Host "✅ Dry run artifact found: $exePath"
          } else {
            Write-Error "Dry run artifact missing: $exePath"
            exit 1
          }

          $bundlePath = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 10
          if ($bundlePath) {
            Write-Host "✅ Dry run bundle artifacts detected"
            $bundlePath | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Warning "No bundle artifacts detected in dry run output"
          }

          Write-Host "✅ Dry run verification completed"

      - name: Distribute Portable EXE
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if ($tag) { $tag = "v$tag" } else { $tag = "${{ github.ref_name }}" }

          Write-Host "Target Tag: $tag"

          $exePath = "src-tauri/target/release/Pailer.exe"
          if (Test-Path $exePath) {
            gh release upload "$tag" "$exePath" --clobber
            $hash = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLower()
            Write-Host "PORTABLE EXE HASH: $hash"
          } else {
            Write-Warning "Portable EXE not found at $exePath. Skipping upload."
          }
