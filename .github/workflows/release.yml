name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: |
            ~/.vite
            node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.cargo\bin
            C:\Users\runneradmin\.cargo\env
          key: ${{ runner.os }}-rust-toolchain-stable-1.94.0
          restore-keys: |
            ${{ runner.os }}-rust-toolchain-stable-
            ${{ runner.os }}-rust-toolchain-

      - name: Cache sccache binary
        uses: actions/cache@v4
        with:
          path: C:\sccache_bin
          key: sccache-bin-${{ runner.os }}-v0.14.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        shell: pwsh
        run: |
          $destPath = "C:\sccache_bin"
          if (!(Test-Path "$destPath\sccache.exe")) {
            $url = "https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz"
            Invoke-WebRequest -Uri $url -OutFile sccache.tar.gz
            tar -xzf sccache.tar.gz
            $sccacheExe = Get-ChildItem -Path . -Filter sccache.exe -Recurse | Select-Object -First 1
            if (!(Test-Path $destPath)) { New-Item -ItemType Directory -Path $destPath }
            Move-Item $sccacheExe.FullName "$destPath\sccache.exe"
            Remove-Item sccache.tar.gz -Force
          }
          echo "$destPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: C:\sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          cache-all-crates: true
          cache-on-failure: true

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Upload Setup
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: C:\sccache
          SCCACHE_CACHE_SIZE: 2G
          SCCACHE_IDLE_TIMEOUT: 0
        with:
          includeRelease: true
          tagName: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}

      - name: Stop sccache server
        run: sccache --stop-server || true
        shell: pwsh

      - name: Distribute Portable EXE
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if ($tag) { $tag = "v$tag" } else { $tag = "${{ github.ref_name }}" }

          Write-Host "Target Tag: $tag"

          $exePath = "src-tauri/target/release/Pailer.exe"
          if (Test-Path $exePath) {
            gh release upload "$tag" "$exePath" --clobber
            $hash = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLower()
            Write-Host "PORTABLE EXE HASH: $hash"
          } else {
            Write-Warning "Portable EXE not found at $exePath. Skipping upload."
          }
