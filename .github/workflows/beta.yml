name: Beta Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.1)'
        required: true
        type: string
      beta:
        description: 'Beta number (e.g. 1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      NODE_VERSION: '20'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install sccache
        shell: pwsh
        run: |
          $url = "https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-pc-windows-msvc.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile sccache.tar.gz
          tar -xzf sccache.tar.gz
          $sccacheExe = Get-ChildItem -Path . -Filter sccache.exe -Recurse | Select-Object -First 1
          $destPath = "C:\sccache_bin"
          if (!(Test-Path $destPath)) { New-Item -ItemType Directory -Path $destPath }
          Move-Item $sccacheExe.FullName "$destPath\sccache.exe"
          echo "$destPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: C:\sccache
          key: sccache-${{ runner.os }}-beta-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-beta-
            sccache-${{ runner.os }}-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Update Tauri config version
        shell: pwsh
        run: |
          $cfg = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $fullVersion = "${{ inputs.version }}-beta.${{ inputs.beta }}"
          $cfg.version = $fullVersion
          $cfg.bundle.createUpdaterArtifacts = $false
          $cfg | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          Write-Host "Version updated to: $fullVersion"

      - name: Update package.json version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "${{ inputs.version }}-beta.${{ inputs.beta }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Write-Host "package.json version updated"

      - name: Update Cargo.toml version
        shell: pwsh
        run: |
          $lines = Get-Content src-tauri/Cargo.toml
          $inPackage = $false
          for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^\[package\]') {
                  $inPackage = $true
              } elseif ($lines[$i] -match '^\[') {
                  $inPackage = $false
              }
              if ($inPackage -and $lines[$i] -match '^version = ') {
                  $lines[$i] = 'version = "${{ inputs.version }}-beta.${{ inputs.beta }}"'
                  break
              }
          }
          $lines | Set-Content src-tauri/Cargo.toml
          Write-Host "Cargo.toml version updated"

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: C:\sccache
          SCCACHE_CACHE_SIZE: 2G
          SCCACHE_IDLE_TIMEOUT: 0

      - name: Stop sccache server
        run: sccache --stop-server || true
        shell: pwsh

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          $product = "Pailer"
          $exePath = Get-ChildItem -Path "src-tauri/target/release" -Filter "$product.exe" -Recurse | 
                     Where-Object { $_.FullName -notlike "*\deps\*" } | 
                     Select-Object -First 1 -ExpandProperty FullName
          
          if ($exePath) {
            $dest = "Pailer_v${{ inputs.version }}_beta${{ inputs.beta }}_Portable.exe"
            Copy-Item $exePath "./$dest"
            Write-Host "Portable EXE ready: $dest"
            
            $hash = (Get-FileHash "./$dest" -Algorithm SHA256).Hash.ToLower()
            Write-Host "HASH: $hash"
          } else {
            Write-Error "Could not find the executable."
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Pailer-${{ inputs.version }}-beta.${{ inputs.beta }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            Pailer_*_beta*_Portable.exe
          retention-days: 7
          if-no-files-found: error