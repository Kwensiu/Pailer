name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Upload Setup
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          includeRelease: true

          tagName: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}

      - name: Distribute Portable EXE (No-Zip)
        shell: pwsh
        run: |

          $version = "${{ github.event.inputs.version }}"
          if (!$version) { $version = "${{ github.ref_name }}".TrimStart('v') }

          $exePath = "src-tauri/target/release/Pailer.exe"

          $portableName = "Pailer-Portable-x64.exe"

          if (Test-Path $exePath) {
            Copy-Item $exePath $portableName
            
            gh release upload "v$version" "$portableName#Portable Executable (Direct EXE)" --clobber

            $hash = (Get-FileHash $portableName -Algorithm SHA256).Hash.ToLower()
            Write-Host "----------------------------------------------"
            Write-Host "PORTABLE EXE HASH: $hash"
            Write-Host "----------------------------------------------"
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
